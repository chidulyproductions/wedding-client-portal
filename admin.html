<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Chi Duly Productions</title>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400&family=Raleway:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0c0f;
      --card: #1a1720;
      --border: #2e2a35;
      --text: #f0ecf5;
      --muted: #7a7385;
      --accent: #a07840;
      --blush: #b06878;
      --green: #4caf7d;
      --font-display: 'Bodoni Moda', serif;
      --font-body: 'Raleway', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-logo {
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-style: italic;
      color: var(--text);
      margin-bottom: 40px;
    }

    .login-field {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 18px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1rem;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .login-field:focus { border-color: var(--accent); }
    .login-field::placeholder { color: var(--muted); }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 14px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    .login-btn:hover { opacity: 0.85; }

    .login-error {
      color: var(--blush);
      font-size: 0.8rem;
      margin-top: 10px;
    }

    /* ── ADMIN DASHBOARD ── */
    #admin-screen { display: none; }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-brand {
      font-family: var(--font-display);
      font-size: 1rem;
      font-style: italic;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 6px 14px;
      font-family: var(--font-body);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover { border-color: var(--blush); color: var(--blush); }

    .main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 48px 40px;
    }

    .section-heading {
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ── NEW CLIENT FORM ── */
    .new-client-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px;
      margin-bottom: 48px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .form-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }

    .submit-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 11px 28px;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .form-msg {
      font-size: 0.8rem;
      margin-top: 12px;
      min-height: 20px;
    }

    .form-msg.success { color: var(--green); }
    .form-msg.error { color: var(--blush); }

    /* ── CLIENTS TABLE ── */
    .clients-table {
      width: 100%;
      border-collapse: collapse;
    }

    .clients-table th {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .clients-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .clients-table tr:last-child td { border-bottom: none; }
    .clients-table tr:hover td { background: var(--card); }

    .client-name {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1rem;
      color: var(--blush);
    }

    .client-date {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .link-cell a {
      color: var(--accent);
      font-size: 0.75rem;
      text-decoration: none;
      letter-spacing: 0.05em;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .link-cell a:hover { opacity: 1; text-decoration: underline; }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 4px 10px;
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 8px;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--green); color: var(--green); }

    .status-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
    }

    .status-active {
      background: rgba(76, 175, 125, 0.15);
      color: var(--green);
      border: 1px solid rgba(76, 175, 125, 0.3);
    }

    .status-locked {
      background: rgba(176, 104, 120, 0.15);
      color: var(--blush);
      border: 1px solid rgba(176, 104, 120, 0.3);
    }

    .status-archived {
      background: rgba(160, 120, 64, 0.15);
      color: #d0a870;
      border: 1px solid rgba(160, 120, 64, 0.35);
    }

    .archived-meta {
      margin-top: 6px;
      color: #9b8f80;
      font-size: 0.66rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 5px 12px;
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 6px;
    }

    .action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn.lock:hover { border-color: var(--blush); color: var(--blush); }
    .action-btn.resend:hover { border-color: var(--green); color: var(--green); }
    .action-btn.delete { border-color: #3a2a2a; color: #6a4a4a; }
    .action-btn.delete:hover { border-color: #c0392b; color: #c0392b; }
    .action-btn.restore { border-color: #2f5c44; color: #6eb88d; }
    .action-btn.restore:hover { border-color: #42b983; color: #42b983; }
    .action-btn.purge { border-color: #6a2525; color: #d78585; }
    .action-btn.purge:hover { border-color: #d94848; color: #ffb3b3; }

    .delete-confirm {
      display: none;
      margin-top: 10px;
      padding: 14px 16px;
      background: #1a0f0f;
      border: 1px solid #5a2a2a;
      border-radius: 6px;
      font-size: 0.75rem;
      color: #d4a0a0;
      line-height: 1.6;
    }

    .delete-confirm.visible { display: block; }

    .delete-confirm-msg {
      margin-bottom: 12px;
      font-family: 'Raleway', sans-serif;
      letter-spacing: 0.05em;
    }

    .delete-confirm-msg strong {
      color: #e88;
      display: block;
      margin-bottom: 4px;
      font-size: 0.8rem;
    }

    .delete-confirm-actions {
      display: flex;
      gap: 40px;
      align-items: center;
      justify-content: space-between;
    }

    .delete-cancel-btn {
      background: none;
      border: 1px solid #3a2a2a;
      color: #9a7a7a;
      border-radius: 4px;
      padding: 6px 16px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .delete-cancel-btn:hover { border-color: #9a7a7a; color: #ccc; }

    .delete-confirm-btn {
      background: #7a1a1a;
      border: 1px solid #c0392b;
      color: #ffaaaa;
      border-radius: 4px;
      padding: 6px 20px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: auto;
    }

    .delete-confirm-btn:hover { background: #c0392b; color: #fff; }

    .delete-confirm-input {
      width: 100%;
      margin: 0 0 10px;
      padding: 8px 10px;
      background: #2a1a1a;
      border: 1px solid #5a2a2a;
      border-radius: 4px;
      color: #ffe0e0;
      font-family: 'Raleway', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .delete-confirm-input:focus {
      outline: none;
      border-color: #c0392b;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .empty-state em {
      font-family: var(--font-display);
      font-size: 1.4rem;
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      opacity: 0.3;
    }

    /* ── SEND LINK MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px;
      width: 100%;
      max-width: 460px;
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      margin-bottom: 4px;
    }
    .modal-subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 24px;
    }
    .modal-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .modal-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-input[readonly] { opacity: 0.5; cursor: default; }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 4px;
    }
    .modal-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 8px 20px;
      font-family: var(--font-body);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-cancel:hover { border-color: var(--muted); color: var(--text); }
    .modal-send {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 4px;
      padding: 8px 22px;
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-send:hover { opacity: 0.85; }
    .modal-msg { font-size: 0.8rem; margin-top: 14px; min-height: 18px; }
    .modal-msg.success { color: var(--green); }
    .modal-msg.error { color: var(--blush); }

    /* ── INLINE EDIT FORMS ── */
    .edit-inline-form {
      display: none;
      margin-top: 8px;
      gap: 6px;
      align-items: center;
    }
    .edit-inline-form.visible { display: flex; }
    .edit-inline-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
    }
    .edit-inline-input:focus { border-color: var(--accent); }
    .edit-inline-save {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 4px;
      padding: 6px 12px;
      font-family: var(--font-body);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .edit-inline-save:hover { opacity: 0.85; }
    .edit-inline-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .edit-inline-cancel:hover { color: var(--text); }

    /* ── INLINE EMAIL EDIT (legacy classes) ── */
    .edit-email-form {
      display: none;
      margin-top: 8px;
      gap: 6px;
      align-items: center;
    }
    .edit-email-form.visible { display: flex; }
    .edit-email-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
    }
    .edit-email-input:focus { border-color: var(--accent); }
    .edit-email-save {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 4px;
      padding: 6px 12px;
      font-family: var(--font-body);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .edit-email-save:hover { opacity: 0.85; }
    .edit-email-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .edit-email-cancel:hover { color: var(--text); }
  </style>
</head>
<body>

  <!-- SEND LINK MODAL -->
  <div class="modal-overlay" id="send-modal" onclick="if(event.target===this)closeSendModal()">
    <div class="modal-box">
      <div class="modal-title">Send Magic Link</div>
      <div class="modal-subtitle" id="send-modal-subtitle"></div>
      <div class="modal-label">Primary Email</div>
      <input class="modal-input" id="send-primary-email" type="email" readonly />
      <div class="modal-label">Additional Recipients <span style="color:var(--muted);font-size:0.7rem;text-transform:none;letter-spacing:0">(optional — comma-separated)</span></div>
      <input class="modal-input" id="send-extra-emails" type="text" placeholder="groom@email.com, planner@email.com" />
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeSendModal()">Cancel</button>
        <button class="modal-send" id="send-modal-btn" onclick="sendLinkFromModal()">Send Link</button>
      </div>
      <div class="modal-msg" id="send-modal-msg"></div>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">Chi Duly Productions</div>
      <div class="login-title">Admin Portal</div>
      <input type="email" class="login-field" id="login-email" placeholder="Your email address" />
      <input type="password" class="login-field" id="login-password" placeholder="Password" />
      <button class="login-btn" onclick="adminLogin()">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="admin-screen">
    <div class="topbar">
      <div class="topbar-brand">Chi Duly Productions — Admin</div>
      <div class="topbar-right">
        <button class="logout-btn" onclick="adminLogout()">Sign Out</button>
        <button id="spotify-btn" class="action-btn" onclick="connectSpotify()" style="margin-left:12px;">Connect Spotify</button>
      </div>
    </div>

    <div class="main">

      <!-- NEW CLIENT -->
      <div class="section-heading">Add New Client</div>
      <div class="new-client-form">
        <div class="form-grid">
          <div class="form-field">
            <label class="form-label">Client Name(s)</label>
            <input type="text" class="form-input" id="new-name" placeholder="Sierra & Thad" />
          </div>
          <div class="form-field">
            <label class="form-label">Wedding Date</label>
            <input type="date" class="form-input" id="new-date" />
          </div>
          <div class="form-field">
            <label class="form-label">Client Email</label>
            <input type="email" class="form-input" id="new-email" placeholder="bride@email.com" />
          </div>
        </div>
        <button class="submit-btn" id="add-btn" onclick="addClient()">Create Client</button>
        <div class="form-msg" id="form-msg"></div>
      </div>

      <!-- CLIENT LIST -->
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
        <div class="section-heading" style="margin:0;">All Clients</div>
        <button class="action-btn" id="toggle-archived-btn" onclick="toggleArchivedView()">Show Archived</button>
      </div>
      <div class="form-msg" id="action-msg"></div>
      <div id="clients-container">
        <div class="empty-state"><em>Loading...</em></div>
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://lfnlftxqdelcrmbceiob.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmbmxmdHhxZGVsY3JtYmNlaW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5Mzg5NDIsImV4cCI6MjA4ODUxNDk0Mn0._-XQuBtlKW0B87QDR6kF1wYU_0FQLjRnTPMJ7xIp59s';
    const BASE_URL = 'https://chidulyproductions.github.io/wedding-client-portal/spotify-selections.html';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let showArchivedClients = false;

    // ── AUTH ──
    async function adminLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message;
        return;
      }
      showDashboard();
    }

    async function adminLogout() {
      await sb.auth.signOut();
      document.getElementById('admin-screen').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
    }

    async function showDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadClients();
      updateSpotifyBtn();
    }

    // ── CHECK SESSION ──
    sb.auth.onAuthStateChange((event, session) => {
      if (session) {
        showDashboard();
      }
    });

    // ── ADD CLIENT ──
    async function addClient() {
      const name = document.getElementById('new-name').value.trim();
      const date = document.getElementById('new-date').value;
      const email = document.getElementById('new-email').value.trim();
      const msgEl = document.getElementById('form-msg');
      const btn = document.getElementById('add-btn');

      if (!name || !date || !email) {
        msgEl.textContent = 'Please fill in all fields.';
        msgEl.className = 'form-msg error';
        return;
      }

      btn.disabled = true;
      msgEl.textContent = 'Creating client...';
      msgEl.className = 'form-msg';

      // Save client record only — magic link is sent separately
      const { error: dbError } = await sb.from('clients').insert({
        name, wedding_date: date, email, locked: false
      });

      if (dbError) {
        msgEl.textContent = 'Error: ' + dbError.message;
        msgEl.className = 'form-msg error';
      } else {
        msgEl.textContent = `✓ Client created. Use "Send Link" when ready to invite them.`;
        msgEl.className = 'form-msg success';
        document.getElementById('new-name').value = '';
        document.getElementById('new-date').value = '';
        document.getElementById('new-email').value = '';
        loadClients();
      }

      btn.disabled = false;
    }

    // ── LOAD CLIENTS ──
    async function loadClients() {
      const container = document.getElementById('clients-container');
      const toggleBtn = document.getElementById('toggle-archived-btn');
      if (toggleBtn) toggleBtn.textContent = showArchivedClients ? 'Hide Archived' : 'Show Archived';
      const { data, error } = await sb.from('clients').select('*').order('wedding_date');

      if (error || !data?.length) {
        container.innerHTML = '<div class="empty-state"><em>No clients yet.</em>Add your first client above.</div>';
        return;
      }

      const visibleClients = showArchivedClients ? data : data.filter(c => !c.deleted_at);

      if (!visibleClients.length) {
        container.innerHTML = '<div class="empty-state"><em>No active clients.</em>Toggle "Show Archived" to review archived records.</div>';
        return;
      }

      // Fetch all client notes and admin replies
      const clientKeys = visibleClients.map(c => deriveClientKey(c.name, c.wedding_date));
      const { data: notesData } = await sb.from('wedding_selections')
        .select('client_key, section_id, notes, updated_at')
        .in('client_key', clientKeys)
        .in('section_id', ['additional-notes', 'admin-reply']);
      const notesMap = {};
      (notesData || []).forEach(r => {
        if (!notesMap[r.client_key]) notesMap[r.client_key] = {};
        notesMap[r.client_key][r.section_id] = r;
      });

      // Fetch Spotify playlist records for all clients
      const { data: playlistsData } = await sb.from('spotify_playlists')
        .select('client_key, playlist_name, playlist_url')
        .in('client_key', clientKeys)
        .order('playlist_name');
      const playlistsMap = {};
      (playlistsData || []).forEach(r => {
        if (!playlistsMap[r.client_key]) playlistsMap[r.client_key] = [];
        playlistsMap[r.client_key].push(r);
      });

      const rows = visibleClients.map(c => {
        const url = `${BASE_URL}?name=${encodeURIComponent(c.name)}&date=${encodeURIComponent(c.wedding_date)}`;
        const dateFormatted = new Date(c.wedding_date + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        const ck = deriveClientKey(c.name, c.wedding_date);
        const clientNote = notesMap[ck]?.['additional-notes']?.notes || '';
        const clientPlaylists = playlistsMap[ck] || [];
        const adminReply = notesMap[ck]?.['admin-reply']?.notes || '';
        const replyTime = notesMap[ck]?.['admin-reply']?.updated_at || '';
        return `
          <tr>
            <td>
              <div class="client-name">${c.name}</div>
              <div class="edit-inline-form" id="edit-name-${c.id}">
                <input class="edit-inline-input" type="text" id="edit-name-input-${c.id}" value="${c.name}" />
                <button class="edit-inline-save" onclick="saveEditName('${c.id}')">Save</button>
                <button class="edit-inline-cancel" onclick="hideEdit('edit-name-${c.id}')">✕</button>
              </div>
            </td>
            <td>
              <div class="client-date">${dateFormatted}</div>
              <div class="edit-inline-form" id="edit-date-${c.id}">
                <input class="edit-inline-input" type="date" id="edit-date-input-${c.id}" value="${c.wedding_date}" />
                <button class="edit-inline-save" onclick="saveEditDate('${c.id}')">Save</button>
                <button class="edit-inline-cancel" onclick="hideEdit('edit-date-${c.id}')">✕</button>
              </div>
            </td>
            <td>
              <div>${c.email}</div>
              <div class="edit-email-form" id="edit-email-${c.id}">
                <input class="edit-email-input" type="email" id="edit-email-input-${c.id}" value="${c.email}" />
                <button class="edit-email-save" onclick="saveEditEmail('${c.id}')">Save</button>
                <button class="edit-email-cancel" onclick="hideEditEmail('${c.id}')">✕</button>
              </div>
            </td>
            <td>
              <span class="status-badge ${c.deleted_at ? 'status-archived' : (c.locked ? 'status-locked' : 'status-active')}">
                ${c.deleted_at ? 'Archived' : (c.locked ? 'Locked' : 'Active')}
              </span>
              ${c.deleted_at ? `<div class="archived-meta">Archived ${new Date(c.deleted_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>` : ''}
            </td>
            <td class="link-cell">
              <a href="${url}" target="_blank">View Page ↗</a>
              <button class="copy-btn" onclick="copyLink('${url}', this)">Copy Link</button>
            </td>
            <td>
              ${c.deleted_at ? `
                <button class="action-btn restore" onclick="restoreClient('${c.id}')">Restore</button>
                <button class="action-btn purge" onclick="showDeleteConfirm('${c.id}')">Purge</button>
              ` : `
                <button class="action-btn resend" onclick="openSendModal('${c.email}', '${c.name}', '${c.wedding_date}')">Send Link</button>
                <button class="action-btn" onclick="showEdit('edit-name-${c.id}', 'edit-name-input-${c.id}')">Edit Name</button>
                <button class="action-btn" onclick="showEdit('edit-date-${c.id}', 'edit-date-input-${c.id}')">Edit Date</button>
                <button class="action-btn" onclick="showEditEmail('${c.id}')">Edit Email</button>
                <button class="action-btn lock" onclick="toggleLock('${c.id}', ${c.locked})">${c.locked ? 'Unlock' : 'Lock'}</button>
                <button class="action-btn" onclick="toggleNotesRow('${c.id}')" style="${clientNote ? 'color:#b06878;font-weight:600;' : ''}">Notes${clientNote ? ' ●' : ''}</button>
                <button class="action-btn" onclick="exportToSpotify('${ck}', '${c.name.replace(/'/g, "\\'")}', this)">Export ♫</button>
                <button class="action-btn" onclick="togglePlaylistsRow('${c.id}')" style="${clientPlaylists.length ? 'color:#1db954;border-color:#1db954;' : ''}">Playlists${clientPlaylists.length ? ' ♫' : ''}</button>
                <button class="action-btn delete" onclick="archiveClient('${c.id}')">Archive</button>
              `}
              <div class="delete-confirm" id="delete-confirm-${c.id}">
                <div class="delete-confirm-msg">
                  <strong>⚠ Purge cannot be undone.</strong>
                  Permanently remove archived client <em>${c.name}</em> and all related data?
                </div>
                <input class="delete-confirm-input" id="delete-confirm-input-${c.id}" placeholder="Type DELETE to purge" />
                <div class="delete-confirm-actions">
                  <button class="delete-cancel-btn" onclick="hideDeleteConfirm('${c.id}')">Cancel</button>
                  <button class="delete-confirm-btn" onclick="confirmDelete('${c.id}')">Yes, Purge Permanently</button>
                </div>
              </div>
            </td>
          </tr>
          <tr id="playlists-row-${c.id}" style="display:none;">
            <td colspan="6" style="padding:16px 24px; background:#0f0d14; border-top:none;">
              <div style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.15em; color:#1db954; margin-bottom:10px;">Spotify Playlists</div>
              ${clientPlaylists.length ? `
                <div style="display:flex; flex-wrap:wrap; gap:8px;">
                  ${clientPlaylists.map(p => `
                    <a href="${p.playlist_url}" target="_blank" style="display:inline-flex; align-items:center; gap:6px; background:#1a1720; border:1px solid #1db954; border-radius:20px; padding:5px 14px; color:#1db954; font-family:'Raleway',sans-serif; font-size:0.75rem; text-decoration:none; white-space:nowrap; transition:background 0.15s;" onmouseover="this.style.background='#1db95422'" onmouseout="this.style.background='#1a1720'">
                      ♫ ${p.playlist_name.replace(/.* — /, '')}
                    </a>
                  `).join('')}
                </div>
              ` : `<em style="color:#7a7385; font-size:0.85rem;">No playlists exported yet. Click Export ♫ to generate.</em>`}
            </td>
          </tr>
          <tr id="notes-row-${c.id}" style="display:none;">
            <td colspan="6" style="padding:16px 24px; background:#141118; border-top:none;">
              <div style="display:grid; gap:12px;">
                <div>
                  <div style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.15em; color:#7a7385; margin-bottom:4px;">Client Notes</div>
                  <div style="color:#f0ecf5; white-space:pre-wrap; padding:10px; background:#1a1720; border-radius:6px; min-height:40px;">${clientNote || '<em style="color:#7a7385;">No notes yet</em>'}</div>
                </div>
                <div>
                  <div style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.15em; color:#a07840; margin-bottom:4px;">Your Reply${replyTime ? ' (' + new Date(replyTime).toLocaleDateString() + ')' : ''}</div>
                  <textarea id="reply-${ck}" style="width:100%; min-height:80px; resize:vertical; background:#2a2330; border:1px solid #3e3a45; border-radius:6px; padding:10px; font-family:'Raleway',sans-serif; font-size:0.9rem; color:#f0ecf5;">${adminReply}</textarea>
                  <div style="display:flex; justify-content:flex-end; margin-top:8px;">
                    <button class="action-btn" onclick="sendReply('${ck}', '${c.email}', '${c.name.replace(/'/g, "\\'")}')" style="background:#a07840; color:#fff; border:none;">Send Reply</button>
                  </div>
                </div>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      container.innerHTML = `
        <table class="clients-table">
          <thead>
            <tr>
              <th>Client</th>
              <th>Wedding Date</th>
              <th>Email</th>
              <th>Status</th>
              <th>Portal Link</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    // ── COPY LINK ──
    function copyLink(url, btn) {
      navigator.clipboard.writeText(url);
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy Link'; btn.classList.remove('copied'); }, 2000);
    }

    // ── SEND LINK MODAL ──
    let _sendModalData = {};

    function openSendModal(email, name, date) {
      _sendModalData = { email, name, date };
      document.getElementById('send-primary-email').value = email;
      document.getElementById('send-modal-subtitle').textContent = name;
      document.getElementById('send-extra-emails').value = '';
      document.getElementById('send-modal-msg').textContent = '';
      document.getElementById('send-modal-msg').className = 'modal-msg';
      document.getElementById('send-modal-btn').disabled = false;
      document.getElementById('send-modal').classList.add('visible');
    }

    function closeSendModal() {
      document.getElementById('send-modal').classList.remove('visible');
    }

    async function sendLinkFromModal() {
      const { email, name, date } = _sendModalData;
      const extraRaw = document.getElementById('send-extra-emails').value.trim();
      const extras = extraRaw ? extraRaw.split(',').map(e => e.trim()).filter(Boolean) : [];
      const allEmails = [email, ...extras];
      const redirectTo = `${BASE_URL}?name=${encodeURIComponent(name)}&date=${encodeURIComponent(date)}`;
      const msgEl = document.getElementById('send-modal-msg');
      const btn = document.getElementById('send-modal-btn');

      btn.disabled = true;
      msgEl.textContent = 'Sending...';
      msgEl.className = 'modal-msg';

      const errors = [];
      for (const addr of allEmails) {
        const { error } = await sb.auth.signInWithOtp({
          email: addr,
          options: { emailRedirectTo: redirectTo, shouldCreateUser: true }
        });
        if (error) errors.push(addr + ': ' + error.message);
      }

      if (errors.length) {
        msgEl.textContent = 'Error: ' + errors.join('; ');
        msgEl.className = 'modal-msg error';
        btn.disabled = false;
      } else {
        msgEl.textContent = `✓ Link sent to ${allEmails.join(', ')}`;
        msgEl.className = 'modal-msg success';
        setTimeout(closeSendModal, 2500);
      }
    }

    // ── GENERIC INLINE EDIT ──
    function showEdit(formId, inputId) {
      document.querySelectorAll('.edit-inline-form.visible').forEach(el => el.classList.remove('visible'));
      document.getElementById(formId).classList.add('visible');
      document.getElementById(inputId).focus();
    }

    function hideEdit(formId) {
      document.getElementById(formId).classList.remove('visible');
    }

    function deriveClientKey(name, date) {
      return (name + '-' + date).toLowerCase().replace(/[^a-z0-9-]/g, '-');
    }

    // ── NOTES + REPLY ──
    function toggleNotesRow(id) {
      const row = document.getElementById('notes-row-' + id);
      if (row) row.style.display = row.style.display === 'none' ? '' : 'none';
    }

    function togglePlaylistsRow(id) {
      const row = document.getElementById('playlists-row-' + id);
      if (row) row.style.display = row.style.display === 'none' ? '' : 'none';
    }

    async function sendReply(clientKey, clientEmail, clientName) {
      const textarea = document.getElementById('reply-' + clientKey);
      if (!textarea) return;
      const text = textarea.value.trim();
      if (!text) return;

      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Saving...';

      const { error } = await sb.from('wedding_selections').upsert({
        client_key: clientKey,
        section_id: 'admin-reply',
        notes: text,
        updated_at: new Date().toISOString()
      }, { onConflict: 'client_key,section_id' });

      if (error) {
        btn.textContent = 'Error: ' + error.message;
        btn.disabled = false;
        return;
      }

      // Send email notification
      btn.textContent = 'Sending email...';
      try {
        const emailRes = await fetch('https://lfnlftxqdelcrmbceiob.supabase.co/functions/v1/send-reply-email', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
          },
          body: JSON.stringify({ clientEmail, clientName, replyText: text })
        });
        const result = await emailRes.json();
        if (!emailRes.ok) {
          btn.textContent = '✓ Saved (email failed: ' + (result.error || 'unknown') + ')';
          setTimeout(() => { btn.textContent = 'Send Reply'; btn.disabled = false; }, 4000);
          return;
        }
      } catch (e) {
        btn.textContent = '✓ Saved (email failed)';
        setTimeout(() => { btn.textContent = 'Send Reply'; btn.disabled = false; }, 3000);
        return;
      }

      btn.textContent = '✓ Reply Sent + Emailed';
      setTimeout(() => { btn.textContent = 'Send Reply'; btn.disabled = false; }, 2500);
    }

    // ── EDIT NAME ──
    async function saveEditName(id) {
      const input = document.getElementById('edit-name-input-' + id);
      const newName = input.value.trim();
      if (!newName) {
        input.style.borderColor = 'var(--blush)';
        setTimeout(() => { input.style.borderColor = ''; }, 2000);
        return;
      }

      // Get current client data to compute old client key
      const { data: client, error: fetchErr } = await sb.from('clients').select('name, wedding_date').eq('id', id).single();
      if (fetchErr) { alert('Error: ' + fetchErr.message); return; }

      const oldKey = deriveClientKey(client.name, client.wedding_date);
      const newKey = deriveClientKey(newName, client.wedding_date);

      // Migrate selections if key changed
      if (oldKey !== newKey) {
        const { error: migErr } = await sb.from('wedding_selections').update({ client_key: newKey }).eq('client_key', oldKey);
        if (migErr) { alert('Error migrating selections: ' + migErr.message); return; }
      }

      const { error } = await sb.from('clients').update({ name: newName }).eq('id', id);
      if (error) { alert('Error updating name: ' + error.message); return; }
      hideEdit('edit-name-' + id);
      loadClients();
    }

    // ── EDIT DATE ──
    async function saveEditDate(id) {
      const input = document.getElementById('edit-date-input-' + id);
      const newDate = input.value;
      if (!newDate) {
        input.style.borderColor = 'var(--blush)';
        setTimeout(() => { input.style.borderColor = ''; }, 2000);
        return;
      }

      const { data: client, error: fetchErr } = await sb.from('clients').select('name, wedding_date').eq('id', id).single();
      if (fetchErr) { alert('Error: ' + fetchErr.message); return; }

      const oldKey = deriveClientKey(client.name, client.wedding_date);
      const newKey = deriveClientKey(client.name, newDate);

      if (oldKey !== newKey) {
        const { error: migErr } = await sb.from('wedding_selections').update({ client_key: newKey }).eq('client_key', oldKey);
        if (migErr) { alert('Error migrating selections: ' + migErr.message); return; }
      }

      const { error } = await sb.from('clients').update({ wedding_date: newDate }).eq('id', id);
      if (error) { alert('Error updating date: ' + error.message); return; }
      hideEdit('edit-date-' + id);
      loadClients();
    }

    // ── EDIT EMAIL ──
    function showEditEmail(id) {
      document.querySelectorAll('.edit-email-form.visible').forEach(el => el.classList.remove('visible'));
      document.getElementById('edit-email-' + id).classList.add('visible');
      document.getElementById('edit-email-input-' + id).focus();
    }

    function hideEditEmail(id) {
      document.getElementById('edit-email-' + id).classList.remove('visible');
    }

    async function saveEditEmail(id) {
      const input = document.getElementById('edit-email-input-' + id);
      const newEmail = input.value.trim();
      if (!newEmail || !newEmail.includes('@')) {
        input.style.borderColor = 'var(--blush)';
        setTimeout(() => { input.style.borderColor = ''; }, 2000);
        return;
      }
      const { error } = await sb.from('clients').update({ email: newEmail }).eq('id', id);
      if (error) { alert('Error updating email: ' + error.message); return; }
      hideEditEmail(id);
      loadClients();
    }

    // ── CLIENT LIFECYCLE (ARCHIVE / RESTORE / PURGE) ──
    function showActionMsg(text, type = '') {
      const el = document.getElementById('action-msg');
      if (!el) return;
      el.textContent = text || '';
      el.className = type ? ('form-msg ' + type) : 'form-msg';
    }

    function toggleArchivedView() {
      showArchivedClients = !showArchivedClients;
      loadClients();
    }

    async function callAdminDeleteFunction(payload) {
      const { data: sessionData } = await sb.auth.getSession();
      const token = sessionData?.session?.access_token;
      if (!token) throw new Error('Admin session expired. Please log in again.');

      const response = await fetch(`${SUPABASE_URL}/functions/v1/admin-delete-client`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify(payload)
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(result.error || 'Request failed.');
      return result;
    }

    async function archiveClient(id) {
      showActionMsg('Archiving client...', '');
      try {
        await callAdminDeleteFunction({ action: 'archive', clientId: id });
        showActionMsg('Client archived. Toggle "Show Archived" to restore or purge.', 'success');
        await loadClients();
      } catch (err) {
        showActionMsg('Archive failed: ' + err.message, 'error');
      }
    }

    async function restoreClient(id) {
      showActionMsg('Restoring client...', '');
      try {
        await callAdminDeleteFunction({ action: 'restore', clientId: id });
        showActionMsg('Client restored successfully.', 'success');
        await loadClients();
      } catch (err) {
        showActionMsg('Restore failed: ' + err.message, 'error');
      }
    }

    function showDeleteConfirm(id) {
      document.querySelectorAll('.delete-confirm.visible').forEach(el => el.classList.remove('visible'));
      document.getElementById('delete-confirm-' + id).classList.add('visible');
      const input = document.getElementById('delete-confirm-input-' + id);
      if (input) {
        input.value = '';
        input.style.borderColor = '';
        input.focus();
      }
    }

    function hideDeleteConfirm(id) {
      document.getElementById('delete-confirm-' + id).classList.remove('visible');
      const input = document.getElementById('delete-confirm-input-' + id);
      if (input) {
        input.value = '';
        input.style.borderColor = '';
      }
    }

    async function confirmDelete(id) {
      const btn = document.querySelector(`#delete-confirm-${id} .delete-confirm-btn`);
      const input = document.getElementById('delete-confirm-input-' + id);
      const typed = (input?.value || '').trim().toUpperCase();

      if (typed !== 'DELETE') {
        showActionMsg('Type DELETE to confirm permanent purge.', 'error');
        if (input) {
          input.style.borderColor = '#c0392b';
          input.focus();
        }
        return;
      }

      if (btn) { btn.disabled = true; btn.textContent = 'Purging...'; }
      showActionMsg('Purging archived client securely...', '');

      try {
        await callAdminDeleteFunction({ action: 'purge', clientId: id, confirmText: typed });
        hideDeleteConfirm(id);
        showActionMsg('Client purged and logged successfully.', 'success');
        await loadClients();
      } catch (err) {
        showActionMsg('Purge failed: ' + err.message, 'error');
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Yes, Purge Permanently'; }
      }
    }

    // ── TOGGLE LOCK ──
    async function toggleLock(id, currentLocked) {
      await sb.from('clients').update({ locked: !currentLocked }).eq('id', id).is('deleted_at', null);
      loadClients();
    }

    // ── SPOTIFY ──
    function connectSpotify() {
      window.location.href = 'https://lfnlftxqdelcrmbceiob.supabase.co/functions/v1/spotify-auth';
    }

    function updateSpotifyBtn() {
      const btn = document.getElementById('spotify-btn');
      if (!btn) return;
      const connected = localStorage.getItem('spotify_connected') === 'true';
      if (connected) {
        btn.textContent = 'Spotify Connected ✓';
        btn.style.color = 'var(--green)';
        btn.style.borderColor = 'var(--green)';
        btn.style.cursor = 'default';
        btn.onclick = null;
      }
    }

    // Check URL params on load for OAuth callback result
    (function checkSpotifyCallback() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('spotify_connected') === 'true') {
        localStorage.setItem('spotify_connected', 'true');
        const url = new URL(window.location);
        url.searchParams.delete('spotify_connected');
        window.history.replaceState({}, '', url);
      }
      if (params.get('spotify_error')) {
        console.error('Spotify OAuth error:', params.get('spotify_error'));
        const url = new URL(window.location);
        url.searchParams.delete('spotify_error');
        window.history.replaceState({}, '', url);
      }
    })();

    async function exportToSpotify(clientKey, clientName, btn) {
      const connected = localStorage.getItem('spotify_connected') === 'true';
      if (!connected) {
        alert('Connect Spotify first using the button in the header.');
        return;
      }

      const originalText = btn.textContent;
      btn.textContent = 'Exporting...';
      btn.disabled = true;

      try {
        const res = await fetch('https://lfnlftxqdelcrmbceiob.supabase.co/functions/v1/spotify-export', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ client_key: clientKey, client_name: clientName }),
        });

        const data = await res.json();

        if (!res.ok) {
          if (data.missing && data.missing.length > 0) {
            alert(`Export blocked — missing songs for:\n\n${data.missing.join('\n')}\n\nFill in or remove these sections first.`);
          } else {
            alert(`Export failed: ${data.error}`);
          }
          return;
        }

        let msg = `Exported ${data.exported} playlist${data.exported !== 1 ? 's' : ''} to Spotify.`;
        if (data.manual && data.manual.length > 0) {
          msg += `\n\nHandle manually (non-Spotify links — check playlist descriptions):\n${data.manual.join('\n')}`;
        }
        alert(msg);

        btn.textContent = 'Exported ✓';
        btn.style.color = 'var(--green)';
        btn.style.borderColor = 'var(--green)';
        // Reload so the Playlists button lights up with fresh data
        setTimeout(() => loadClients(), 800);
        setTimeout(() => {
          btn.textContent = originalText;
          btn.style.color = '';
          btn.style.borderColor = '';
          btn.disabled = false;
        }, 3000);

      } catch (err) {
        alert(`Export error: ${err.message}`);
      } finally {
        if (btn.disabled) {
          btn.textContent = originalText;
          btn.disabled = false;
        }
      }
    }
  </script>
