<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Chi Duly Productions</title>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400&family=Raleway:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0c0f;
      --card: #1a1720;
      --border: #2e2a35;
      --text: #f0ecf5;
      --muted: #7a7385;
      --accent: #a07840;
      --blush: #b06878;
      --green: #4caf7d;
      --font-display: 'Bodoni Moda', serif;
      --font-body: 'Raleway', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-logo {
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-style: italic;
      color: var(--text);
      margin-bottom: 40px;
    }

    .login-field {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 18px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1rem;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .login-field:focus { border-color: var(--accent); }
    .login-field::placeholder { color: var(--muted); }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 14px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    .login-btn:hover { opacity: 0.85; }

    .login-error {
      color: var(--blush);
      font-size: 0.8rem;
      margin-top: 10px;
    }

    /* ── ADMIN DASHBOARD ── */
    #admin-screen { display: none; }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-brand {
      font-family: var(--font-display);
      font-size: 1rem;
      font-style: italic;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 6px 14px;
      font-family: var(--font-body);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover { border-color: var(--blush); color: var(--blush); }

    .main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 48px 40px;
    }

    .section-heading {
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ── NEW CLIENT FORM ── */
    .new-client-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px;
      margin-bottom: 48px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .form-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }

    .submit-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 11px 28px;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .form-msg {
      font-size: 0.8rem;
      margin-top: 12px;
      min-height: 20px;
    }

    .form-msg.success { color: var(--green); }
    .form-msg.error { color: var(--blush); }

    /* ── CLIENTS TABLE ── */
    .clients-table {
      width: 100%;
      border-collapse: collapse;
    }

    .clients-table th {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .clients-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .clients-table tr:last-child td { border-bottom: none; }
    .clients-table tr:hover td { background: var(--card); }

    .client-name {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1rem;
      color: var(--blush);
    }

    .client-date {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .link-cell a {
      color: var(--accent);
      font-size: 0.75rem;
      text-decoration: none;
      letter-spacing: 0.05em;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .link-cell a:hover { opacity: 1; text-decoration: underline; }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 4px 10px;
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 8px;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--green); color: var(--green); }

    .status-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
    }

    .status-active {
      background: rgba(76, 175, 125, 0.15);
      color: var(--green);
      border: 1px solid rgba(76, 175, 125, 0.3);
    }

    .status-locked {
      background: rgba(176, 104, 120, 0.15);
      color: var(--blush);
      border: 1px solid rgba(176, 104, 120, 0.3);
    }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 5px 12px;
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 6px;
    }

    .action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn.lock:hover { border-color: var(--blush); color: var(--blush); }
    .action-btn.resend:hover { border-color: var(--green); color: var(--green); }
    .action-btn.delete { border-color: #3a2a2a; color: #6a4a4a; }
    .action-btn.delete:hover { border-color: #c0392b; color: #c0392b; }

    .delete-confirm {
      display: none;
      margin-top: 10px;
      padding: 14px 16px;
      background: #1a0f0f;
      border: 1px solid #5a2a2a;
      border-radius: 6px;
      font-size: 0.75rem;
      color: #d4a0a0;
      line-height: 1.6;
    }

    .delete-confirm.visible { display: block; }

    .delete-confirm-msg {
      margin-bottom: 12px;
      font-family: 'Raleway', sans-serif;
      letter-spacing: 0.05em;
    }

    .delete-confirm-msg strong {
      color: #e88;
      display: block;
      margin-bottom: 4px;
      font-size: 0.8rem;
    }

    .delete-confirm-actions {
      display: flex;
      gap: 40px;
      align-items: center;
      justify-content: space-between;
    }

    .delete-cancel-btn {
      background: none;
      border: 1px solid #3a2a2a;
      color: #9a7a7a;
      border-radius: 4px;
      padding: 6px 16px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .delete-cancel-btn:hover { border-color: #9a7a7a; color: #ccc; }

    .delete-confirm-btn {
      background: #7a1a1a;
      border: 1px solid #c0392b;
      color: #ffaaaa;
      border-radius: 4px;
      padding: 6px 20px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: auto;
    }

    .delete-confirm-btn:hover { background: #c0392b; color: #fff; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .empty-state em {
      font-family: var(--font-display);
      font-size: 1.4rem;
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      opacity: 0.3;
    }

    /* ── SEND LINK MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px;
      width: 100%;
      max-width: 460px;
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      margin-bottom: 4px;
    }
    .modal-subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 24px;
    }
    .modal-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .modal-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-input[readonly] { opacity: 0.5; cursor: default; }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 4px;
    }
    .modal-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 8px 20px;
      font-family: var(--font-body);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-cancel:hover { border-color: var(--muted); color: var(--text); }
    .modal-send {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 4px;
      padding: 8px 22px;
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-send:hover { opacity: 0.85; }
    .modal-msg { font-size: 0.8rem; margin-top: 14px; min-height: 18px; }
    .modal-msg.success { color: var(--green); }
    .modal-msg.error { color: var(--blush); }

    /* ── INLINE EMAIL EDIT ── */
    .edit-email-form {
      display: none;
      margin-top: 8px;
      gap: 6px;
      align-items: center;
    }
    .edit-email-form.visible { display: flex; }
    .edit-email-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
    }
    .edit-email-input:focus { border-color: var(--accent); }
    .edit-email-save {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 4px;
      padding: 6px 12px;
      font-family: var(--font-body);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .edit-email-save:hover { opacity: 0.85; }
    .edit-email-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .edit-email-cancel:hover { color: var(--text); }
  </style>
</head>
<body>

  <!-- SEND LINK MODAL -->
  <div class="modal-overlay" id="send-modal" onclick="if(event.target===this)closeSendModal()">
    <div class="modal-box">
      <div class="modal-title">Send Magic Link</div>
      <div class="modal-subtitle" id="send-modal-subtitle"></div>
      <div class="modal-label">Primary Email</div>
      <input class="modal-input" id="send-primary-email" type="email" readonly />
      <div class="modal-label">Additional Recipients <span style="color:var(--muted);font-size:0.7rem;text-transform:none;letter-spacing:0">(optional — comma-separated)</span></div>
      <input class="modal-input" id="send-extra-emails" type="text" placeholder="groom@email.com, planner@email.com" />
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeSendModal()">Cancel</button>
        <button class="modal-send" id="send-modal-btn" onclick="sendLinkFromModal()">Send Link</button>
      </div>
      <div class="modal-msg" id="send-modal-msg"></div>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">Chi Duly Productions</div>
      <div class="login-title">Admin Portal</div>
      <input type="email" class="login-field" id="login-email" placeholder="Your email address" />
      <input type="password" class="login-field" id="login-password" placeholder="Password" />
      <button class="login-btn" onclick="adminLogin()">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="admin-screen">
    <div class="topbar">
      <div class="topbar-brand">Chi Duly Productions — Admin</div>
      <div class="topbar-right">
        <button class="logout-btn" onclick="adminLogout()">Sign Out</button>
      </div>
    </div>

    <div class="main">

      <!-- NEW CLIENT -->
      <div class="section-heading">Add New Client</div>
      <div class="new-client-form">
        <div class="form-grid">
          <div class="form-field">
            <label class="form-label">Client Name(s)</label>
            <input type="text" class="form-input" id="new-name" placeholder="Sierra & Thad" />
          </div>
          <div class="form-field">
            <label class="form-label">Wedding Date</label>
            <input type="date" class="form-input" id="new-date" />
          </div>
          <div class="form-field">
            <label class="form-label">Client Email</label>
            <input type="email" class="form-input" id="new-email" placeholder="bride@email.com" />
          </div>
        </div>
        <button class="submit-btn" id="add-btn" onclick="addClient()">Create Client</button>
        <div class="form-msg" id="form-msg"></div>
      </div>

      <!-- CLIENT LIST -->
      <div class="section-heading">All Clients</div>
      <div id="clients-container">
        <div class="empty-state"><em>Loading...</em></div>
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://lfnlftxqdelcrmbceiob.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmbmxmdHhxZGVsY3JtYmNlaW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5Mzg5NDIsImV4cCI6MjA4ODUxNDk0Mn0._-XQuBtlKW0B87QDR6kF1wYU_0FQLjRnTPMJ7xIp59s';
    const BASE_URL = 'https://chidulyproductions.github.io/wedding-client-portal/spotify-selections.html';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── AUTH ──
    async function adminLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message;
        return;
      }
      showDashboard();
    }

    async function adminLogout() {
      await sb.auth.signOut();
      document.getElementById('admin-screen').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
    }

    async function showDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadClients();
    }

    // ── CHECK SESSION ──
    sb.auth.onAuthStateChange((event, session) => {
      if (session) {
        showDashboard();
      }
    });

    // ── ADD CLIENT ──
    async function addClient() {
      const name = document.getElementById('new-name').value.trim();
      const date = document.getElementById('new-date').value;
      const email = document.getElementById('new-email').value.trim();
      const msgEl = document.getElementById('form-msg');
      const btn = document.getElementById('add-btn');

      if (!name || !date || !email) {
        msgEl.textContent = 'Please fill in all fields.';
        msgEl.className = 'form-msg error';
        return;
      }

      btn.disabled = true;
      msgEl.textContent = 'Creating client...';
      msgEl.className = 'form-msg';

      // Save client record only — magic link is sent separately
      const { error: dbError } = await sb.from('clients').insert({
        name, wedding_date: date, email, locked: false
      });

      if (dbError) {
        msgEl.textContent = 'Error: ' + dbError.message;
        msgEl.className = 'form-msg error';
      } else {
        msgEl.textContent = `✓ Client created. Use "Send Link" when ready to invite them.`;
        msgEl.className = 'form-msg success';
        document.getElementById('new-name').value = '';
        document.getElementById('new-date').value = '';
        document.getElementById('new-email').value = '';
        loadClients();
      }

      btn.disabled = false;
    }

    // ── LOAD CLIENTS ──
    async function loadClients() {
      const container = document.getElementById('clients-container');
      const { data, error } = await sb.from('clients').select('*').order('wedding_date');

      if (error || !data?.length) {
        container.innerHTML = '<div class="empty-state"><em>No clients yet.</em>Add your first client above.</div>';
        return;
      }

      const rows = data.map(c => {
        const url = `${BASE_URL}?name=${encodeURIComponent(c.name)}&date=${encodeURIComponent(c.wedding_date)}`;
        const dateFormatted = new Date(c.wedding_date + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        return `
          <tr>
            <td><div class="client-name">${c.name}</div></td>
            <td><div class="client-date">${dateFormatted}</div></td>
            <td>
              <div>${c.email}</div>
              <div class="edit-email-form" id="edit-email-${c.id}">
                <input class="edit-email-input" type="email" id="edit-email-input-${c.id}" value="${c.email}" />
                <button class="edit-email-save" onclick="saveEditEmail('${c.id}')">Save</button>
                <button class="edit-email-cancel" onclick="hideEditEmail('${c.id}')">✕</button>
              </div>
            </td>
            <td>
              <span class="status-badge ${c.locked ? 'status-locked' : 'status-active'}">
                ${c.locked ? 'Locked' : 'Active'}
              </span>
            </td>
            <td class="link-cell">
              <a href="${url}" target="_blank">View Page ↗</a>
              <button class="copy-btn" onclick="copyLink('${url}', this)">Copy Link</button>
            </td>
            <td>
              <button class="action-btn resend" onclick="openSendModal('${c.email}', '${c.name}', '${c.wedding_date}')">Send Link</button>
              <button class="action-btn" onclick="showEditEmail('${c.id}')">Edit Email</button>
              <button class="action-btn lock" onclick="toggleLock('${c.id}', ${c.locked})">${c.locked ? 'Unlock' : 'Lock'}</button>
              <button class="action-btn delete" onclick="showDeleteConfirm('${c.id}')">Delete</button>
              <div class="delete-confirm" id="delete-confirm-${c.id}">
                <div class="delete-confirm-msg">
                  <strong>⚠ This cannot be undone.</strong>
                  Permanently delete <em>${c.name}</em> and all their data?
                </div>
                <div class="delete-confirm-actions">
                  <button class="delete-cancel-btn" onclick="hideDeleteConfirm('${c.id}')">Cancel</button>
                  <button class="delete-confirm-btn" onclick="confirmDelete('${c.id}')">Yes, Delete Permanently</button>
                </div>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      container.innerHTML = `
        <table class="clients-table">
          <thead>
            <tr>
              <th>Client</th>
              <th>Wedding Date</th>
              <th>Email</th>
              <th>Status</th>
              <th>Portal Link</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    // ── COPY LINK ──
    function copyLink(url, btn) {
      navigator.clipboard.writeText(url);
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy Link'; btn.classList.remove('copied'); }, 2000);
    }

    // ── SEND LINK MODAL ──
    let _sendModalData = {};

    function openSendModal(email, name, date) {
      _sendModalData = { email, name, date };
      document.getElementById('send-primary-email').value = email;
      document.getElementById('send-modal-subtitle').textContent = name;
      document.getElementById('send-extra-emails').value = '';
      document.getElementById('send-modal-msg').textContent = '';
      document.getElementById('send-modal-msg').className = 'modal-msg';
      document.getElementById('send-modal-btn').disabled = false;
      document.getElementById('send-modal').classList.add('visible');
    }

    function closeSendModal() {
      document.getElementById('send-modal').classList.remove('visible');
    }

    async function sendLinkFromModal() {
      const { email, name, date } = _sendModalData;
      const extraRaw = document.getElementById('send-extra-emails').value.trim();
      const extras = extraRaw ? extraRaw.split(',').map(e => e.trim()).filter(Boolean) : [];
      const allEmails = [email, ...extras];
      const redirectTo = `${BASE_URL}?name=${encodeURIComponent(name)}&date=${encodeURIComponent(date)}`;
      const msgEl = document.getElementById('send-modal-msg');
      const btn = document.getElementById('send-modal-btn');

      btn.disabled = true;
      msgEl.textContent = 'Sending...';
      msgEl.className = 'modal-msg';

      const errors = [];
      for (const addr of allEmails) {
        const { error } = await sb.auth.signInWithOtp({
          email: addr,
          options: { emailRedirectTo: redirectTo, shouldCreateUser: true }
        });
        if (error) errors.push(addr + ': ' + error.message);
      }

      if (errors.length) {
        msgEl.textContent = 'Error: ' + errors.join('; ');
        msgEl.className = 'modal-msg error';
        btn.disabled = false;
      } else {
        msgEl.textContent = `✓ Link sent to ${allEmails.join(', ')}`;
        msgEl.className = 'modal-msg success';
        setTimeout(closeSendModal, 2500);
      }
    }

    // ── EDIT EMAIL ──
    function showEditEmail(id) {
      document.querySelectorAll('.edit-email-form.visible').forEach(el => el.classList.remove('visible'));
      document.getElementById('edit-email-' + id).classList.add('visible');
      document.getElementById('edit-email-input-' + id).focus();
    }

    function hideEditEmail(id) {
      document.getElementById('edit-email-' + id).classList.remove('visible');
    }

    async function saveEditEmail(id) {
      const input = document.getElementById('edit-email-input-' + id);
      const newEmail = input.value.trim();
      if (!newEmail || !newEmail.includes('@')) {
        input.style.borderColor = 'var(--blush)';
        setTimeout(() => { input.style.borderColor = ''; }, 2000);
        return;
      }
      const { error } = await sb.from('clients').update({ email: newEmail }).eq('id', id);
      if (error) { alert('Error updating email: ' + error.message); return; }
      hideEditEmail(id);
      loadClients();
    }

    // ── DELETE CLIENT ──
    function showDeleteConfirm(id) {
      // Hide any other open confirms first
      document.querySelectorAll('.delete-confirm.visible').forEach(el => el.classList.remove('visible'));
      document.getElementById('delete-confirm-' + id).classList.add('visible');
    }

    function hideDeleteConfirm(id) {
      document.getElementById('delete-confirm-' + id).classList.remove('visible');
    }

    async function confirmDelete(id) {
      const btn = document.querySelector(`#delete-confirm-${id} .delete-confirm-btn`);
      if (btn) { btn.disabled = true; btn.textContent = 'Deleting...'; }

      try {
        const { data: client, error: fetchErr } = await sb.from('clients').select('name, wedding_date').eq('id', id).single();
        if (fetchErr) { alert('Error fetching client: ' + fetchErr.message); return; }

        const clientKey = (client.name + '-' + client.wedding_date).toLowerCase().replace(/[^a-z0-9-]/g, '-');

        const { error: selErr } = await sb.from('wedding_selections').delete().eq('client_key', clientKey);
        if (selErr) { alert('Error deleting selections: ' + selErr.message); return; }

        const { error } = await sb.from('clients').delete().eq('id', id);
        if (error) { alert('Error deleting client: ' + error.message); return; }

        // Verify deletion actually happened (RLS may silently block it)
        const { data: check } = await sb.from('clients').select('id').eq('id', id).single();
        if (check) {
          alert('Delete was blocked. Check your Supabase RLS policies — the authenticated role may not have DELETE permission on the clients table.');
          return;
        }

        loadClients();
      } catch (err) {
        alert('Delete failed: ' + err.message);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Yes, Delete Permanently'; }
      }
    }

    // ── TOGGLE LOCK ──
    async function toggleLock(id, currentLocked) {
      await sb.from('clients').update({ locked: !currentLocked }).eq('id', id);
      loadClients();
    }
  </script>
</body>
</html>
